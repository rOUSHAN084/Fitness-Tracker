<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:700px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

form{
    display:grid;
    gap:12px;
}

input,select,button{
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#27ae60;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#219150;
}

.summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:25px 0;
}

.card{
    background:#3498db;
    color:white;
    text-align:center;
    padding:18px;
    border-radius:10px;
}

#workouts{
    margin-top:20px;
}

.workout{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f1f1f1;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.delete{
    background:#e74c3c;
    padding:8px 12px;
}

.delete:hover{
    background:#c0392b;
}
</style>
</head>
<body>

<div class="container">

<h1>🏋️ Fitness Tracker</h1>

<form id="form">

<select id="type">
<option>Running</option>
<option>Walking</option>
<option>Cycling</option>
<option>Gym</option>
</select>

<input
type="number"
id="duration"
placeholder="Duration (minutes)"
required>

<input
type="number"
id="calories"
placeholder="Calories Burned"
required>

<button>Add Workout</button>

</form>

<div class="summary">

<div class="card">
<h2 id="totalWorkouts">0</h2>
<p>Workouts</p>
</div>

<div class="card">
<h2 id="totalMinutes">0</h2>
<p>Minutes</p>
</div>

<div class="card">
<h2 id="totalCalories">0</h2>
<p>Calories</p>
</div>

</div>

<div id="workouts"></div>

</div>

<script>

let workouts=JSON.parse(localStorage.getItem("fitness"))||[];

function save(){
localStorage.setItem("fitness",JSON.stringify(workouts));
}

function render(){

const list=document.getElementById("workouts");

list.innerHTML="";

let minutes=0;
let calories=0;

workouts.forEach((w,index)=>{

minutes+=Number(w.duration);
calories+=Number(w.calories);

list.innerHTML+=`
<div class="workout">
<div>
<b>${w.type}</b><br>
${w.duration} min • ${w.calories} cal
</div>

<button class="delete" onclick="removeWorkout(${index})">
Delete
</button>

</div>
`;

});

document.getElementById("totalWorkouts").textContent=workouts.length;
document.getElementById("totalMinutes").textContent=minutes;
document.getElementById("totalCalories").textContent=calories;

save();

}

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault();

const workout={

type:document.getElementById("type").value,

duration:document.getElementById("duration").value,

calories:document.getElementById("calories").value

};

workouts.push(workout);

this.reset();

render();

});

function removeWorkout(index){

workouts.splice(index,1);

render();

}

render();

</script>

</body>
</html>
